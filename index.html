<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CA Toolbox - Professional Tools for Chartered Accountants</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Custom scrollbar for better aesthetics */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* Fade in animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in-up {
            animation: fadeIn 0.4s ease-out forwards;
        }
    </style>
</head>

<body class="bg-gray-50 text-gray-900 font-sans">

    <!-- Navbar / Header -->
    <div class="max-w-6xl mx-auto px-4 py-8">
        <div
            class="border border-gray-200 rounded-lg p-8 bg-white shadow-sm mb-8 transition-shadow hover:shadow-md duration-300">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">THE CA TOOLBOX</h1>
            <p class="text-gray-600 mb-6">Professional Financial Tools for CAs</p>
            <a href="https://www.linkedin.com/company/catoolbox-in/" target="_blank"
                class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 px-6 rounded transition-all duration-200 transform hover:-translate-y-0.5">
                Submit a Tool
            </a>
        </div>

        <!-- Tool Directory -->
        <div class="border border-gray-200 rounded-lg overflow-hidden">
            <div id="loading" class="p-8 text-center text-gray-500">
                Loading tools...
            </div>
            <div id="error" class="hidden p-8 text-center text-red-500">
                Failed to load tools. Please try again later.
            </div>

            <!-- Desktop Table -->
            <div class="hidden md:block overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-50 border-b border-gray-200">
                            <th class="px-6 py-4 text-sm font-semibold text-gray-700 w-16">Sr.</th>
                            <th class="px-6 py-4 text-sm font-semibold text-gray-700 w-1/4">Tool Name</th>
                            <th class="px-6 py-4 text-sm font-semibold text-gray-700">Description</th>
                            <th class="px-6 py-4 text-sm font-semibold text-gray-700 text-center w-32">Download</th>
                            <th class="px-6 py-4 text-sm font-semibold text-gray-700 w-48">Creator</th>
                        </tr>
                    </thead>
                    <tbody id="tools-table-body" class="divide-y divide-gray-200">
                        <!-- Tools will be injected here -->
                    </tbody>
                </table>
            </div>

            <!-- Mobile Cards -->
            <div id="mobile-cards" class="md:hidden divide-y divide-gray-200">
                <!-- Cards will be injected here -->
            </div>
        </div>

        <!-- Footer -->
        <div class="mt-8 text-center text-sm text-gray-500">
            <p class="mb-4">Made with ❤️ by the CA Community</p>
            <div class="flex justify-center space-x-4">

            </div>
        </div>
    </div>



    <script>
        const GITHUB_USERNAME = 'teamsleekcom-lgtm';
        const REPO_NAME = 'ca-toolbox';
        const TOOLS_JSON_URL = `https://raw.githubusercontent.com/${GITHUB_USERNAME}/${REPO_NAME}/main/data/tools.json`;

        // Fetch and display tools
        async function fetchTools() {
            try {
                const response = await fetch(TOOLS_JSON_URL);
                if (!response.ok) throw new Error('Failed to fetch tools');
                const data = await response.json();
                renderTools(data.tools);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('error').classList.remove('hidden');
            }
        }

        function renderTools(tools) {
            const tableBody = document.getElementById('tools-table-body');
            const mobileCards = document.getElementById('mobile-cards');

            document.getElementById('loading').classList.add('hidden');

            tools.forEach((tool, index) => {
                const srNo = index + 1;
                const delay = index * 50; // Stagger animation

                // Desktop Row
                const row = document.createElement('tr');
                row.className = 'hover:bg-blue-50/50 transition duration-200 animate-fade-in-up';
                row.style.animationDelay = `${delay}ms`;
                row.style.opacity = '0';
                row.innerHTML = `
                    <td class="px-6 py-4 text-sm text-gray-500">${srNo}</td>
                    <td class="px-6 py-4 text-sm font-bold text-gray-900">${tool.name}</td>
                    <td class="px-6 py-4 text-sm text-gray-600">${tool.description || ''}</td>
                    <td class="px-6 py-4 text-center">
                        ${tool.name === 'NFRA Compliance Tools'
                        ? `<a href="${tool.downloadUrl}" target="_blank" class="text-blue-600 hover:text-blue-800 hover:underline transition-colors duration-200 text-sm font-medium">nfratools.in</a>`
                        : `<a href="${tool.downloadUrl}" target="_blank" class="inline-block px-4 py-2 border border-blue-600 text-blue-600 rounded hover:bg-blue-600 hover:text-white transition-colors duration-200 text-sm font-medium">↓ Download</a>`}
                    </td>
                    <td class="px-6 py-4 text-sm text-gray-600 font-medium">
                        <div class="flex items-center">
                            ${tool.creator}
                            ${tool.creatorUrl ? `<a href="${tool.creatorUrl}" target="_blank" class="ml-2 text-blue-500 hover:text-blue-700" title="Creator Link"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg></a>` : ''}
                        </div>
                    </td>
                `;
                tableBody.appendChild(row);

                // Mobile Card
                const card = document.createElement('div');
                card.className = 'p-5 bg-white animate-fade-in-up';
                card.style.animationDelay = `${delay}ms`;
                card.style.opacity = '0';
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-3">
                        <span class="text-xs font-bold text-gray-400 bg-gray-100 px-2 py-1 rounded">#${srNo}</span>
                        ${tool.name === 'NFRA Compliance Tools'
                        ? `<a href="${tool.downloadUrl}" target="_blank" class="text-sm font-medium text-blue-600 hover:underline">nfratools.in</a>`
                        : `<a href="${tool.downloadUrl}" target="_blank" class="text-sm font-medium text-blue-600 border border-blue-600 px-3 py-1 rounded hover:bg-blue-50 transition-colors duration-200">Download</a>`}
                    </div>
                    <h3 class="font-bold text-gray-900 text-lg mb-1">${tool.name}</h3>
                    <p class="text-sm text-gray-600 mb-3">${tool.description || ''}</p>
                    <p class="text-sm text-gray-500 border-t pt-2 mt-2 flex items-center justify-between">
                        <span>By <span class="font-medium text-gray-900">${tool.creator}</span></span>
                        ${tool.creatorUrl ? `<a href="${tool.creatorUrl}" target="_blank" class="text-blue-500 hover:text-blue-700" title="Creator Link"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg></a>` : ''}
                    </p>
                `;
                mobileCards.appendChild(card);
            });
        }


        // Initialize
        fetchTools();
    </script>
</body>

</html>
